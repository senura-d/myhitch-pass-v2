<script>

// Neural Background Animation
(function() {
  const canvas = document.getElementById('neuralCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  if (!ctx) return;
  const color = '#3b82f6';
  const trailOpacity = 0.15;
  const particleCount = 600;
  const speed = 1;
  let width = window.innerWidth;
  let height = window.innerHeight;
  let particles = [];
  let animationFrameId;
  let mouse = { x: -1000, y: -1000 };
  class Particle {
    constructor() {
      this.reset();
      this.x = Math.random() * width;
      this.y = Math.random() * height;
    }
    update() {
      const angle = (Math.cos(this.x * 0.005) + Math.sin(this.y * 0.005)) * Math.PI;
      this.vx += Math.cos(angle) * 0.2 * speed;
      this.vy += Math.sin(angle) * 0.2 * speed;
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      const interactionRadius = 150;
      if (distance < interactionRadius) {
        const force = (interactionRadius - distance) / interactionRadius;
        this.vx -= dx * force * 0.05;
        this.vy -= dy * force * 0.05;
      }
      this.x += this.vx;
      this.y += this.vy;
      this.vx *= 0.95;
      this.vy *= 0.95;
      this.age++;
      if (this.age > this.life) {
        this.reset();
      }
      if (this.x < 0) this.x = width;
      if (this.x > width) this.x = 0;
      if (this.y < 0) this.y = height;
      if (this.y > height) this.y = 0;
    }
    reset() {
      this.x = Math.random() * width;
      this.y = Math.random() * height;
      this.vx = 0;
      this.vy = 0;
      this.age = 0;
      this.life = Math.random() * 200 + 100;
    }
    draw(context) {
      context.fillStyle = color;
      const alpha = 1 - Math.abs((this.age / this.life) - 0.5) * 2;
      context.globalAlpha = alpha;
      context.fillRect(this.x, this.y, 1.5, 1.5);
    }
  }
  function init() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.scale(dpr, dpr);
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    particles = [];
    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }
  }
  function animate() {
    ctx.fillStyle = 'rgba(0, 0, 0, ' + trailOpacity + ')';
    ctx.fillRect(0, 0, width, height);
    particles.forEach(p => {
      p.update();
      p.draw(ctx);
    });
    animationFrameId = requestAnimationFrame(animate);
  }
  function handleResize() {
    width = window.innerWidth;
    height = window.innerHeight;
    init();
  }
  function handleMouseMove(e) {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
  }
  function handleMouseLeave() {
    mouse.x = -1000;
    mouse.y = -1000;
  }
  init();
  animate();
  window.addEventListener('resize', handleResize);
  window.addEventListener('mousemove', handleMouseMove);
  document.addEventListener('mouseleave', handleMouseLeave);
})();

</script>

<!-- Dropdown Toggle Script -->
<script>
(function() {
  document.querySelectorAll('.relative.group > a').forEach(trigger => {
    trigger.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      const menu = this.nextElementSibling;
      if (menu && menu.classList.contains('nav-dropdown-menu')) {
        const isShown = menu.classList.contains('show-dropdown');
        document.querySelectorAll('.nav-dropdown-menu').forEach(m => m.classList.remove('show-dropdown'));
        if (!isShown) {
          menu.classList.add('show-dropdown');
        }
      }
    });
  });
  document.addEventListener('click', function() {
    document.querySelectorAll('.nav-dropdown-menu').forEach(m => m.classList.remove('show-dropdown'));
  });
})();
</script>
